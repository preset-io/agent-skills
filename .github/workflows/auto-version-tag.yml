name: Auto version tag

on:
  push:
    branches:
      - master
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  tag-and-dispatch:
    if: github.repository == 'preset-io/preset-agent-skills'
    concurrency:
      group: version-tag
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Create missing version tag and dispatch releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must be semver MAJOR.MINOR.PATCH, got ${version}"
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
              echo "Tag ${tag} already exists; skipping release dispatch"
              exit 0
            fi
            echo "Tag ${tag} already exists; dispatching release workflows"
          else
            tag_commit="$(git log -1 --first-parent --format=%H -- VERSION)"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${tag}" -m "Release ${tag}" "${tag_commit}"
            git push origin "refs/tags/${tag}"
          fi

          # Tags pushed with github.token do not trigger tag-push workflows, so dispatch explicitly.
          gh workflow run release.yml --ref master -f "tag=${tag}"
          gh workflow run mirror-public.yml --ref master -f "tag=${tag}"
