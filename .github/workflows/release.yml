name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build assets for (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Verify required system tools
        run: |
          command -v zip
          command -v zipinfo
          command -v jq

      - name: Verify VERSION matches release tag
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          test "v$(cat VERSION)" = "${TAG}" || {
            echo "VERSION ($(cat VERSION)) does not match release tag (${TAG})" >&2
            exit 1
          }

      - name: Run smoke test
        run: ./scripts/smoke-test.sh

      - name: Build Claude web API skill ZIPs
        run: node scripts/build-claude-web-skills.mjs

      - name: Build Claude web MCP skill ZIPs
        run: |
          node scripts/build-claude-web-skills.mjs \
            --source plugins/preset-mcp-skills/skills \
            --out dist/claude-web-flat-mcp-skills

      - name: Build Claude web CLI skill ZIPs
        run: |
          node scripts/build-claude-web-skills.mjs \
            --source plugins/preset-cli-skills/skills \
            --out dist/claude-web-flat-cli-skills

      - name: List generated artifacts
        run: |
          ls -la dist/claude-web-flat-skills/
          ls -la dist/claude-web-flat-mcp-skills/
          ls -la dist/claude-web-flat-cli-skills/

      - name: Upload ZIPs to GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            dist/claude-web-flat-skills/*.zip
            dist/claude-web-flat-mcp-skills/*.zip
            dist/claude-web-flat-cli-skills/*.zip
          fail_on_unmatched_files: true
